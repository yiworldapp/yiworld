name: yi_app
description: "Young Indians - Member App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  photo_view: ^0.15.0
  pinput: ^5.0.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  video_thumbnail: ^0.5.3
  confetti: ^0.7.0

  # Icons
  font_awesome_flutter: ^10.8.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  infinite_scroll_pagination: ^4.1.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.2

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^28.1.33

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/yi_logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/yi_logo.png"
  adaptive_icon_foreground_scale: 0.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

